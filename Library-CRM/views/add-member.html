<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Add Member | Library CRM</title>
 <link rel="stylesheet" href="/css/add-member.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="dashboard">
            <!-- Sidebar -->
 <div class="sidebar">
   <h2>Library CRM</h2>
   <ul>
    <li><a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a></li>
    <li><a href="/add-member"><i class="fa fa-user-plus"></i> Add Member</a></li>
    <li><a href="/members"><i class="fa fa-users"></i> Members</a></li>
    <li><a href="/books"><i class="fa fa-book"></i> Books</a></li>
    <li><a href="#"><i class="fa fa-right-from-bracket"></i> Logout</a></li>
   </ul>
 </div>
        <!-- Main Content -->
 <div class="main">
   <div class="topbar">
    <h1>Add New Member</h1>
   </div>
   <div class="form-container">

            <form action="/add-member" method="POST">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter Full Name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter Email" required>
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="Enter Phone Number" required>
                </div>

                <div class="input-group">
                    <label>Address</label>
                    <textarea name="address" rows="3" placeholder="Enter Address"></textarea>
                </div>

                <div class="input-group">
                    <label>Membership Type</label>

                    <select name="membership">
                        <option>Student</option>
                        <option>Faculty</option>
                        <option>Premium</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Joining Date</label>
                    <input type="date" name="joining_date">
                </div>

                <div class="input-group">
                    <label>Status</label>

                    <select name="status">
                        <option>Active</option>
                        <option>Pending</option>
                        <option>Expired</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="4" placeholder="Write Notes"></textarea>
                </div>

                <button type="submit">
                    <i class="fa fa-plus"></i>
                    Add Member
                </button>

            </form>

        </div>

    </div>

</div>

<script src="/js/script.js"></script>

</body>
</html>
